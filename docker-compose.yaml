version: "3.8"

services:
  mariadb:
    image: mariadb:11.8-noble
    container_name: maria_db
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: mariadb_db
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=1
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - backend

  schema:
    build: ./app
    command: python3 schema.py
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend
  ingest:
    build: ./app
    command: python3 ingest.py
    depends_on:
      mariadb:
        condition: service_healthy
      schema:
        condition: service_completed_successfully
    networks:
      - backend

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_KRAFT_MODE: "True"
      CLUSTER_ID: "kafka-id-101"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_EXTERNAL://kafka:29092
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_BROKER_HEARTBEAT_INTERVAL_MS: 500
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 15000
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_EXTERNAL
    volumes:
      - kafka_kraft:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  debezium:
    image: debezium/connect:2.7
    container_name: debezium
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      kafka:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - backend

  debezium-setup:
    image: curlimages/curl:latest
    container_name: debezium-setup
    restart: "no"
    depends_on:
      debezium:
        condition: service_healthy
    networks:
      - backend
    command: >
      curl -X POST http://debezium:8083/connectors
      -H "Content-Type: application/json"
      -d '{
        "name": "mariadb-connector",
        "config": {
          "connector.class": "io.debezium.connector.mysql.MySqlConnector",
          "database.hostname": "maria_db",
          "database.port": "3306",
          "database.user": "root",
          "database.password": "root",
          "database.server.id": "1",
          "topic.prefix": "dbserver1",
          "database.include.list": "mariadb_db",
          "table.include.list": "mariadb_db.crypto",
          "schema.history.internal.kafka.bootstrap.servers": "kafka:29092",
          "schema.history.internal.kafka.topic": "schema-changes.mariadb"
        }
      }'

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: crypto
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  consumer:
    build: ./app
    command: python3 consumer.py
    restart: on-failure
    depends_on:
      debezium:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend

volumes:
  mariadb-data:
  kafka_kraft:
  postgres-data:

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: "10.0.0.0/19"
          gateway: "10.0.0.1"
