  schema:
    build: ./app
    command: python3 schema.py
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
      # postgres:
      # condition: service_healthy
    networks:
      - backend
  ingest:
    build: ./app
    command: python3 ingest.py
    depends_on:
      mariadb:
        condition: service_healthy
      schema:
        condition: service_completed_successfully
    networks:
      - backend
volumes:
  mariadb-data:
  kafka_kraft:

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: "10.0.0.0/19"
          gateway: "10.0.0.1"

